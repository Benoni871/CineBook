<header class="sticky top-0 z-40 border-b border-ink-700 bg-ink-900/80 backdrop-blur">
  <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4">
    <a routerLink="/" class="flex items-center gap-2 text-xl font-extrabold">
      <span class="grid h-9 w-9 place-items-center rounded-lg bg-tomato-500 text-white">
        <svg lucideFilm class="h-5 w-5"></svg>
      </span>
      <span>Cine<span class="text-tomato-500">Book</span></span>
    </a>

    <div class="flex items-center gap-3">
      @if (!onAuthPage() && location.location(); as loc) {
        <span class="hidden items-center gap-1.5 text-sm text-gray-500 sm:flex">
          <svg lucideMapPin class="h-4 w-4"></svg>
          {{ loc }}
        </span>
      }

      @if (auth.currentUser(); as user) {
        <span class="hidden items-center gap-1.5 text-sm text-gray-700 sm:flex">
          <svg lucideUser class="h-4 w-4"></svg>
          {{ user.username }}
          <span
            class="ml-1 rounded-full bg-tomato-500/10 px-2 py-0.5 text-xs font-semibold text-tomato-600"
            >{{ user.role }}</span
          >
        </span>
        <button type="button" class="btn-ghost py-2" (click)="logout()">
          <svg lucideLogOut class="h-4 w-4"></svg>
          <span class="hidden sm:inline">Logout</span>
        </button>
      } @else {
        <div class="auth-switch" [class.is-register]="onRegister()">
          <span class="auth-switch-thumb"></span>
          <a routerLink="/login" class="auth-switch-link">Sign in</a>
          <a routerLink="/register" class="auth-switch-link">Sign up</a>
        </div>
      }
    </div>
  </nav>
</header>
