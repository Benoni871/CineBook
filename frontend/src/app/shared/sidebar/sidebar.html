<aside id="app-sidebar" class="sidebar">
  <p id="sidebar-heading" class="sidebar-heading">Menu</p>
  <nav id="sidebar-nav" class="space-y-1">
    @for (item of items(); track item.id) {
      <a
        [id]="item.id"
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        class="sidebar-link"
      >
        @switch (item.icon) {
          @case ("clapperboard") {
            <svg lucideClapperboard class="h-5 w-5"></svg>
          }
          @case ("calendar-clock") {
            <svg lucideCalendarClock class="h-5 w-5"></svg>
          }
          @case ("ticket") {
            <svg lucideTicket class="h-5 w-5"></svg>
          }
          @case ("chart-column") {
            <svg lucideChartColumn class="h-5 w-5"></svg>
          }
        }
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</aside>
