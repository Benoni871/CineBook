@if (items().length) {
  <section id="carousel-root" class="card relative mb-8 overflow-hidden">
    <div id="carousel-track" class="carousel-track">
      @for (item of items(); track item; let i = $index) {
        <div [id]="'carousel-slide-' + i" class="carousel-slide" [class.is-active]="i === safeIndex()">
          <img [src]="item.posterUrl" alt="" aria-hidden="true" class="carousel-bg" />
          <div class="carousel-overlay"></div>
          <div class="carousel-inner">
            <img [src]="item.posterUrl" [alt]="item.title ?? ''" class="carousel-poster" />
            <div class="carousel-details">
              <ng-container
                *ngTemplateOutlet="detail; context: { $implicit: item, index: i }"
              ></ng-container>
            </div>
          </div>
        </div>
      }
    </div>

    @if (items().length > 1) {
      <div id="carousel-dots" class="carousel-dots">
        @for (item of items(); track item; let i = $index) {
          <button
            [id]="'carousel-dot-' + i"
            type="button"
            class="carousel-dot"
            [class.is-active]="i === safeIndex()"
            (click)="goToSlide(i)"
            [attr.aria-label]="'Go to slide ' + (i + 1)"
          ></button>
        }
      </div>
    }
  </section>
}
