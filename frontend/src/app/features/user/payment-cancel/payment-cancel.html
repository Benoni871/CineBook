<div id="payment-cancel-page" class="mx-auto flex max-w-md flex-col items-center gap-4 px-4 py-16 text-center">
  <span class="grid h-16 w-16 place-items-center rounded-full bg-ink-800 text-gray-500">
    <svg lucideX class="h-9 w-9"></svg>
  </span>
  <h1 id="payment-cancel-status" class="text-xl font-bold text-gray-900">Payment cancelled</h1>
  <p class="text-sm text-gray-600">
    No charge was made and your held seats have been released. You can pick your seats again
    whenever you're ready.
  </p>
  <a id="payment-cancel-movies-link" routerLink="/movies" class="btn-primary mt-2">Back to movies</a>
</div>
