<div id="payment-success-page" class="mx-auto flex max-w-md flex-col items-center gap-4 px-4 py-16 text-center">
  @if (state() === "processing") {
    <span class="h-12 w-12 animate-spin rounded-full border-4 border-ink-700 border-t-tomato-500"></span>
    <h1 id="payment-success-processing-status" class="text-lg font-bold text-gray-900">Confirming your payment…</h1>
    <p class="text-sm text-gray-600">Please wait while we finalize your booking.</p>
  } @else if (state() === "done") {
    <span class="grid h-16 w-16 place-items-center rounded-full bg-emerald-500/10 text-emerald-600">
      <svg lucideCircleCheck class="h-9 w-9"></svg>
    </span>
    <h1 id="payment-success-status" class="text-xl font-bold text-gray-900">Payment successful</h1>
    <p class="text-sm text-gray-600">Your seats are confirmed. Enjoy the show!</p>
    <a id="payment-success-bookings-link" routerLink="/my-bookings" class="btn-primary mt-2">
      <svg lucideTicket class="h-4 w-4"></svg>
      View my bookings
    </a>
  } @else {
    <span class="grid h-16 w-16 place-items-center rounded-full bg-tomato-500/10 text-tomato-600">
      <svg lucideCircleAlert class="h-9 w-9"></svg>
    </span>
    <h1 id="payment-success-error-status" class="text-xl font-bold text-gray-900">Payment not confirmed</h1>
    <p id="payment-success-error-message" class="text-sm text-gray-600">{{ message() }}</p>
    <a id="payment-success-error-bookings-link" routerLink="/my-bookings" class="btn-ghost mt-2">Go to my bookings</a>
  }
</div>
